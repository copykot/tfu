<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFU Template Tool</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@500;700&family=Fira+Code:wght@400;500&family=Instrument+Sans:wght@300;400;500&display=swap"

    <script id="template-removal-schema" type="application/kdl">
field officer_name label="Officer's name"

field entity_kind label="Removal Reason" {
    "Punishment"
    "Due to rank"
}

field old_certification label="Old Certification" {
    "Recruit Firearms Officer"
    "Tactical Firearms Officer"
    "Incident Commander"
}

field removed label="Removal from TFU?" {
    "No"
    "Yes"
}

showIf removed="Yes" {
    field blacklist label="Blacklisted from TFU?" {
        "No"
        "Yes"
    }

    showIf blacklist="Yes" {
        field blacklist_length label="Blacklist Length"
    }
}
showIf entity_kind="Punishment" {
    showIf removed="No" {
        field new_certification label="New Certification" {
            "Recruit Firearms Officer"
            "Tactical Firearms Officer"
        }
    }

    field what_happened label="What Happened"

    field grading label="Grading Level" {
        "1"
        "2"
        "3.1"
        "3.2"
    }

    field expiry_point label="Date of Point Expiry"
}

showIf entity_kind="Due to rank" {
    field old_rank label="Previous Rank" {
        "Senior Officer"
        "Corporal"
    }
}
    </script>
    <script class="template" type="text/x-handlebars" title="Removal from X" id="template-removal">
<p style="text-align: center;">
    <img src="https://plpd.online/images/swat.png" style="display: block; margin: 0 auto;" width="164" height="164"/><br/>
    {{#if (eq removed "Yes")}}
    <b>Removal from TFU</b><br/>
    {{else}}
    <b>Removal from
        {{#if (eq old_certification "Incident Commander")}}
            TFIC
        {{else if (eq old_certification "Tactical Firearms Officer")}}
            TFO
        {{else}}
            RTFO
        {{/if}}
    </b><br/>
    {{/if}}
    <b>TFU Quality Assurance</b>
</div>

Hello **{{officer_name}}**,<br/><br/>

{{#if (eq entity_kind "Punishment")}}

{{#if (eq removed "Yes")}}
This message serves notice of your removal from the Tactical Firearms Unit. This decision wasn't made in a hurry, an in depth investigation and discussion have taken place and TFU Command have deemed your actions do not represent the qualities we expect from our members of this Unit. The reason for this removal is the following:
{{else}}
This message serves notice of the removal of your {{old_certification}} certification, following this inbox you will have the {{new_certification}} certification. This decision wasn't made in a hurry, an in depth investigation and discussion have taken place and TFU Command have deemed your actions do not represent the qualities we expect from our TFOs.
{{/if}}
<br/><br/>

<b>What happened: **{{what_happened}}**</b><br/>
<b>Disciplinary grading: **{{grading}}**</b><br/>
<b>Points issued:
{{#if (eq grading "1")}}
1
{{else if (eq grading "2")}}
2
{{else if (eq grading "3.1")}}
3
{{else}}
4
{{/if}}
</b><br/>
<b>Date of point expiry: **{{expiry_point}}**</b>
{{else}}
This message serves notice of the removal of your {{old_certification}} certification.
{{#if (eq removed "Yes")}}
Following this inbox you will be removed from the Tactical Firearms Unit as you are no longer qualified due to your demotion from {{old_rank}}.
{{else}}
Following this inbox your {{old_certification}} certification will be removed as you are no longer qualified due to your demotion from {{old_rank}}.
{{/if}}
{{/if}}<br/><br/>

{{#if (eq blacklist "Yes")}}
Following this decision, you will receive a <b>{{blacklist_length}} blacklist</b> from applying to any role within the Tactical Firearms Unit.<br/><br/>
{{/if}}

{{#if (eq entity_kind "Due to rank")}}
Feel free to reapply for the {{old_certification}} application again once you have reached the required qualifications.<br/><br/>

If you wish to dispute this disciplinary action, you may do so by directing a helpdesk to TFU and the Head of TFU will deal with it.
{{else}}
If you wish to dispute this disciplinary action, you may do so by directing a helpdesk to TFU and the Head of TFU will deal with it. If this punishment was decided from an Internal affairs complaint that you are actively disputing, the punishment will remain until the verdict is decided. At which point the decision of the dispute will dictate whether it is removed or not.
{{/if}}<br/><br/>

<b>Regards,</b><br/>
Lieutenant Tyler Bounce<br/>
Staff Sergeant Vina Yin<br/>
<b>TFU Quality Assurance</b><br/>
    </script>

    <style>
        :root {
            --bg: #0f1115;
            --panel: #151922;
            --panel-2: #1b2130;
            --text: #e6e6e6;
            --muted: #9aa4b2;
            --border: #2a3242;
            --accent: #6aa6ff;
            --danger: #ff5c5c;

<body>

    <div id="react-body"></div>


    <script type="text/babel">
        function Field({ node, formData, onChange }) {
            const name = node.values[0];

            if (node.children.length > 0) {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <select
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        >
                            <option value="">-- Select an option --</option>
                            {node.children.map(v => (
                                <option key={v.name} value={v.name}>{v.name}</option>
                            ))}
                        </select>
                    </div>
                );
            }

            if (node.properties.multiline === "yes") {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <textarea id="input-text"
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        />
                    </div>
                );
            } else {
                return (
                    <div className="field-container">
                        <label>{node.properties.label || name}</label>
                        <input
                            type="text"
                            name={name}
                            value={formData[name] || ""}
                            onChange={e => onChange(name, e.target.value)}
                        />
                    </div>
                );
            }
        }


        function RenderNode({ node, formData, onChange }) {
            if (node.name === "field") {
                return <Field node={node} formData={formData} onChange={onChange} />;
            }

            if (node.name === "showIf") {
                const shouldShow = Object.entries(node.properties || {}).every(
                    ([k, v]) => formData[k] === v
                );

                if (!shouldShow) return null;

                return node.children.map((child, i) => (
                    <RenderNode
                        key={i}
                        node={child}
                        formData={formData}
                        onChange={onChange}
                    />
                ));
            }

            return null;
        }



        function App() {
            const [formData, setFormData] = React.useState({});
            const [selectedTemplate, setSelectedTemplate] = React.useState(Object.keys(window.templates)[0]);
            const schema = React.useMemo(() => window.templates[selectedTemplate].schema, [selectedTemplate]);
            const formIsFilled = React.useMemo(() => {
                const requiredFields = [];
                function findRequiredFields(node) {
                    if (node.name === "field") {
                        requiredFields.push(node.values[0]);
                    } else if (node.name === "showIf") {
                        const shouldShow = Object.entries(node.properties || {}).every(
                            ([k, v]) => formData[k] === v
                        );
                        if (shouldShow)
                            node.children.forEach(findRequiredFields);
                    }
                }
                schema.output.forEach(findRequiredFields);
                return requiredFields.every(field => formData[field]);
            }, [schema, formData]);



            const renderedOutput = React.useMemo(() => {
                const template = Handlebars.compile(window.templates[selectedTemplate].content);
                const rendered = template(formData, { noEscape: true });
                console.log(rendered);
                const out = marked.parse(rendered);
                console.log(out);
                return {
                    html: '<meta http-equiv="content-type" content="text/html; charset=utf-8">' + out,
                    md: rendered
                }
            }, [formData, selectedTemplate, formIsFilled]);


            function onChange(name, value) {
                setFormData(prev => ({ ...prev, [name]: value }));
            }

            async function copyRichText() {
                if (!navigator.clipboard) {
                    alert("Clipboard API not supported");
                    return;
                }

                try {
                    await navigator.clipboard.write([
                        new ClipboardItem({
                            "text/html": new Blob([renderedOutput.html], { type: "text/html" }),
                            "text/plain": new Blob([renderedOutput.md], { type: "text/plain" })
                        })
                    ]);
                    alert("Rendered output copied to clipboard!");
                } catch (err) {
                    console.error("Failed to copy: ", err);
                    alert("Failed to copy rendered output.");
                }
            }

            return (
                // schema selector, then form, then rendered output
                <div id="app-container">
                    <div id="app-header">
                        <div id="template-selector">
                            <label htmlFor="template-select">Select template:</label>
                            <select
                                id="template-select"
                                value={selectedTemplate}
                                onChange={e => setSelectedTemplate(e.target.value)}
                            >
                                {Object.keys(window.templates).map(templateName => (
                                    <option key={templateName} value={templateName}>
                                        {templateName}
                                    </option>
                                ))}
                            </select>
                        </div>
                    </div>
                    <div id="app-body">
                        <div id="form-container">
                            <h2>Form</h2>
                            {!formIsFilled && <p style={{ color: "red" }}>Form is not entirely filled.</p>}

                            {schema.output.map((node, i) => (
                                <RenderNode
                                    key={i}
                                    node={node}
                                    formData={formData}
                                    onChange={onChange}
                                />
                            ))}
                        </div>

                        <div id="output-container">
                            <div id="buttons-container">
                                <button onClick={copyRichText}>
                                    Copy Rendered Output
                                </button>
                            </div>
                            <div id="rendered-output">
                                <div dangerouslySetInnerHTML={{ __html: renderedOutput.html }} />
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById("react-body"))
            .render(<App />);
    </script>

    <script type="module">
        import { parse } from "https://esm.sh/kdljs@0.3.0";

        // Discover all templates
        let templates = {};
        document.querySelectorAll("script.template").forEach(templateScript => {
            const templateName = templateScript.getAttribute("title");
            const templateContent = templateScript.innerHTML;
            const templateSchemaScript = document.getElementById(templateScript.getAttribute("id") + "-schema");
            const templateSchema = parse(templateSchemaScript.innerHTML);
            console.log(templateSchema);
            templates[templateName] = {
                content: templateContent,
                schema: templateSchema
            };
        });

        window.templates = templates;

        Handlebars.registerHelper("eq", function (arg1, arg2) {
            return arg1 === arg2;
        });

        Handlebars.registerHelper("neq", function (arg1, arg2) {
            return arg1 !== arg2;
        });

        Handlebars.registerHelper("and", function (...args) {
            return args.slice(0, -1).every(Boolean);
        });

        Handlebars.registerHelper("nand", function (...args) {
            return !args.slice(0, -1).every(Boolean);
        });


        Handlebars.registerHelper("or", function (...args) {
            return args.slice(0, -1).some(Boolean);
